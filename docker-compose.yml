services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - sira_data:/app/data
    env_file: .env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "8501:8501"
    environment:
      API_URL: "http://backend:8000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sira_data:
